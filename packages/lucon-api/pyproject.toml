[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "lucon-api"
version = "0.1.0"
description = "REST gateway exposing the GEFASOFT LUCON 4C-20A-V over HTTP (see ADR-0003..0005)."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "Michael Bykovski" }]
keywords = ["lucon", "gefasoft", "rest", "api", "gateway", "fastapi", "led"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Manufacturing",
    "Framework :: FastAPI",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering",
    "Typing :: Typed",
]
dependencies = [
    "lucon",
    "fastapi>=0.110",
    "uvicorn>=0.29",
    "pydantic>=2.6",
    "pydantic-settings>=2.2",
]

[project.optional-dependencies]
dev = ["pytest>=8", "mypy>=1.8", "httpx>=0.27"]

[project.scripts]
lucon-api = "lucon_api.__main__:main"

[tool.hatch.build.targets.wheel]
packages = ["src/lucon_api"]

[tool.hatch.metadata]
# 'lucon' resolves from the sibling editable install (packages/lucon) during dev.
allow-direct-references = true

[tool.pytest.ini_options]
pythonpath = ["src", "../lucon/src"]
testpaths = ["tests"]
addopts = "-ra"

[tool.mypy]
python_version = "3.11"
strict = true
files = ["src/lucon_api"]
mypy_path = "../lucon/src"
plugins = ["pydantic.mypy"]
