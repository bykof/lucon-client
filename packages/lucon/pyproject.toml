[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "lucon"
version = "0.1.0"
description = "Python client for the GEFASOFT LUCON 4C-20A-V LED light controller (UDP protocol)."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "Michael Bykovski" }]
keywords = ["lucon", "gefasoft", "machine-vision", "led", "lighting", "udp"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Manufacturing",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering",
    "Typing :: Typed",
]
dependencies = []

[project.optional-dependencies]
dev = ["pytest>=8", "mypy>=1.8"]

[tool.hatch.build.targets.wheel]
packages = ["src/lucon"]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
addopts = "-ra"

[tool.mypy]
python_version = "3.11"
strict = true
files = ["src/lucon"]
